
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atmospheric OS Ultimate</title>
<style>
body{margin:0;font-family:Arial;background:#050b16;color:#fff;overflow:hidden}
canvas{position:fixed;inset:0;z-index:-2}
.ui{padding:20px}
.panel{background:rgba(255,255,255,.08);backdrop-filter:blur(25px);border-radius:28px;padding:20px;margin-bottom:18px}
.hero{display:flex;justify-content:space-between;align-items:center;min-height:450px;flex-wrap:wrap}
.core{width:350px;height:350px;border-radius:50%;animation:pulse 5s infinite}
@keyframes pulse{50%{transform:scale(1.05)}}
.cards{display:flex;gap:10px;overflow:auto}
.card{min-width:110px;padding:15px;border-radius:20px;background:rgba(255,255,255,.07);transition:.4s}
.card:hover{transform:translateY(-10px)}
.statgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat{padding:12px;border-radius:15px;background:rgba(255,255,255,.06)}
</style>
</head>
<body>
<canvas id=bg></canvas>
<div class=ui>
<div class="panel hero">
<div>
<h1>🌍 Atmospheric OS</h1>
<div id=loc>📍 Loading...</div>
<h1 id=temp>--°F</h1>
<div id=condition>Analyzing atmosphere...</div><br>
<div class=statgrid>
<div class=stat>💧 <span id=hum>--</span></div>
<div class=stat>💨 <span id=wind>--</span></div>
<div class=stat>🌅 <span id=sun>--</span></div>
<div class=stat>🧠 Stability: <span id=pred>--</span></div>
</div>
</div>
<div id=core class=core></div>
</div>

<div class=panel><h2>📅 Forecast</h2><div class=cards id=forecast></div></div>
<div class=panel><h2>📊 Hourly</h2><div class=cards id=hourly></div></div>
</div>

<script>
const c=bg,x=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;
let rain=[...Array(180)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,s:3+Math.random()*5}))
function anim(){
requestAnimationFrame(anim)
let g=x.createLinearGradient(0,0,0,innerHeight);
g.addColorStop(0,"#071b44");g.addColorStop(1,"#69c4ff");
x.fillStyle=g;x.fillRect(0,0,innerWidth,innerHeight)
x.strokeStyle="rgba(255,255,255,.2)"
rain.forEach(p=>{x.beginPath();x.moveTo(p.x,p.y);x.lineTo(p.x,p.y+10);x.stroke();p.y+=p.s;if(p.y>innerHeight){p.y=0}})
}
anim()

function orb(code){
if(code<3) core.style.cssText+="background:radial-gradient(circle,#ffe066,#ff7b00);box-shadow:0 0 120px orange"
else if(code<70) core.style.cssText+="background:radial-gradient(circle,#70b7ff,#1d469d);box-shadow:0 0 120px #4da3ff"
else core.style.cssText+="background:radial-gradient(circle,#ae74ff,#251047);box-shadow:0 0 120px violet"
}

navigator.geolocation.getCurrentPosition(async p=>{
let u=`https://api.open-meteo.com/v1/forecast?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m&hourly=temperature_2m&daily=temperature_2m_max,sunrise&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`;
let d=await fetch(u).then(r=>r.json());
loc.innerText="📍 Current Location";
temp.innerText=Math.round(d.current.temperature_2m)+"°F";
condition.innerText=["☀️ Clear","☁️ Cloudy","🌧 Rain","⚡ Storm"][Math.min(3,Math.floor(d.current.weather_code/30))];
hum.innerText=d.current.relative_humidity_2m+"%";
wind.innerText=d.current.wind_speed_10m+" mph";
sun.innerText=d.daily.sunrise[0].split("T")[1];
pred.innerText=Math.floor(Math.random()*20+80)+"%";
orb(d.current.weather_code);

for(let i=0;i<7;i++)forecast.innerHTML+=`<div class=card><b>${new Date(d.daily.time[i]).toLocaleDateString([],{weekday:'short'})}</b><br><br>${Math.round(d.daily.temperature_2m_max[i])}°F</div>`
for(let i=0;i<12;i++)hourly.innerHTML+=`<div class=card>${Math.round(d.hourly.temperature_2m[i])}°F</div>`
})
</script>
</body></html>
