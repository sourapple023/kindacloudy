<!DOCTYPE html><html><head><meta charset="utf-8"><title>Atmospheric OS</title><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;background:#050b16;color:white;font-family:Arial;overflow:hidden}canvas{position:fixed;inset:0;z-index:-1}.ui{padding:20px}.panel{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);padding:20px;border-radius:25px;margin-bottom:20px}.hero{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}.core{width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,#ffd000,#ff7a00);box-shadow:0 0 100px orange;animation:pulse 6s infinite}.forecast,.hourly{display:flex;gap:10px;overflow:auto}.card{padding:15px;min-width:90px;border-radius:15px;background:rgba(255,255,255,.08)}@keyframes pulse{50%{transform:scale(1.05)}}</style></head><body><canvas id="bg"></canvas><div class="ui"><div class="panel hero"><div><h1>🌍 Atmospheric OS</h1><div id="loc">📍 Loading...</div><h1 id="temp">--°</h1><div id="condition"></div></div><div class="core"></div></div><div class="panel"><h2>📅 Forecast</h2><div id="forecast" class="forecast"></div></div><div class="panel"><h2>📊 Hourly</h2><div id="hourly" class="hourly"></div></div></div><script>const bg=document.getElementById("bg"),x=bg.getContext("2d");bg.width=innerWidth;bg.height=innerHeight;function a(){requestAnimationFrame(a);let g=x.createLinearGradient(0,0,0,innerHeight);g.addColorStop(0,"#0d2f70");g.addColorStop(1,"#64c8ff");x.fillStyle=g;x.fillRect(0,0,innerWidth,innerHeight)}a();async function load(lat,lon){let u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&hourly=temperature_2m&daily=temperature_2m_max&timezone=auto`;let d=await fetch(u).then(r=>r.json());loc.innerText="📍 Current Location";temp.innerText=Math.round(d.current.temperature_2m)+"°";condition.innerText="Live atmosphere online";for(let i=0;i<7;i++)forecast.innerHTML+=`<div class='card'>${Math.round(d.daily.temperature_2m_max[i])}°</div>`;for(let i=0;i<12;i++)hourly.innerHTML+=`<div class='card'>${Math.round(d.hourly.temperature_2m[i])}°</div>`}navigator.geolocation.getCurrentPosition(p=>load(p.coords.latitude,p.coords.longitude));</script></body></html>
